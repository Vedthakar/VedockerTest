<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Vedocker Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #151b23;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      max-width: 640px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #7c3aed;
    }
    p {
      line-height: 1.6;
      color: #d0d7de;
    }
    code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vedocker Demo Works</h1>
    <p>This repo was cloned, built, and started by my mini-Docker platform.</p>
    <p>Image built from a GitHub repo. Container is running successfully.</p>
    <p><code>busybox httpd</code> is serving this file from inside the container.</p>
  </div>
</body>
</html>
